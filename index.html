<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Stick Cricket Supreme</title>
  <style>
    body {
      margin:0; padding:0;
      background:#000;
      color:#0f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow:hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game { display:block; background:#0a1f0a; }
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    #ui {
      position: absolute;
      top: 8px; left: 12px; right: 12px;
      z-index: 15;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      font-size: 1.4rem;
      text-shadow: 0 0 6px #000, 0 0 12px #000;
    }
    #status {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 6.5vw;
      font-weight: bold;
      color: #ffeb3b;
      text-shadow: 0 0 20px #000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #menu, #gameover {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #0f0;
      z-index: 30;
      pointer-events: all;
    }
    #menu h1, #gameover h1 {
      font-size: 9vw;
      margin: 0.2em 0;
      text-shadow: 0 0 15px #0f0;
    }
    button {
      font-size: 5.5vw;
      padding: 14px 32px;
      margin: 12px;
      min-width: 220px;
      background: #111;
      color: #0f0;
      border: 3px solid #0f0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:active { transform: scale(0.94); background: #0a300a; }
    #stats {
      font-size: 4.2vw;
      line-height: 1.5;
      text-align: center;
      margin: 1em 0;
      color: #8f8;
    }
    #controls {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      pointer-events: all;
    }
    .shot-btn {
      font-size: 5vw;
      padding: 16px 28px;
      background: rgba(20,40,20,0.7);
      border: 2px solid #0c5;
      border-radius: 50%;
      width: 110px; height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #straightBtn { font-size: 4.8vw; width: 140px; height: 140px; border-color: #0f0; }

    @media (orientation: landscape) {
      #controls { bottom: 8px; }
      .shot-btn { width: 90px; height: 90px; font-size: 4vw; }
      #straightBtn { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="overlay">
    <div id="ui">
      <div>Score: <span id="score">0</span></div>
      <div>Wickets: <span id="wickets">0</span>/3</div>
    </div>

    <div id="status"></div>

    <div id="controls" style="display:none">
      <div class="shot-btn" id="leftBtn">COVER</div>
      <div class="shot-btn" id="straightBtn">DRIVE</div>
      <div class="shot-btn" id="rightBtn">LOFT</div>
    </div>

    <div id="menu">
      <h1>STICK CRICKET</h1>
      <button id="startBtn">START GAME</button>
      <div style="margin-top:2em; font-size:4vw; opacity:0.7;">
        Tap zones or buttons to play<br>
        Try to beat your high score!
      </div>
    </div>

    <div id="gameover" style="display:none">
      <h1>GAME OVER</h1>
      <div id="stats"></div>
      <button id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const wicketsEl = document.getElementById('wickets');
  const statusEl = document.getElementById('status');
  const menu = document.getElementById('menu');
  const gameover = document.getElementById('gameover');
  const controls = document.getElementById('controls');
  const statsEl = document.getElementById('stats');

  let state = 'menu'; // menu | playing | gameover
  let score = 0;
  let wickets = 0;
  let ballsFaced = 0;
  let sixes = 0;
  let fours = 0;
  let highScore = Number(localStorage.getItem('stickCricketHigh') || 0);

  let ball = { x:0, y:0, vx:0, vy:0, radius:14 };
  const batsman = { x:0, y:0, batAngle:0, swinging:false, swingTimer:0 };
  let shotType = 'straight';

  const perfectZone = { min:280, max:360 };
  const goodZone   = { min:210, max:430 };

  // ────────────────────────────────────────────────
  //  Resize & Layout
  // ────────────────────────────────────────────────
  function resize() {
    let w = window.innerWidth;
    let h = window.innerHeight;
    const ratio = 16/9.3;

    if (w / h > ratio) {
      canvas.height = h;
      canvas.width = Math.round(h * ratio);
    } else {
      canvas.width = w;
      canvas.height = Math.round(w / ratio);
    }

    batsman.x = canvas.width * 0.18;
    batsman.y = canvas.height * 0.64;

    ball.x = canvas.width + 80;
    ball.y = 140 + Math.random() * (canvas.height * 0.38);
  }
  window.addEventListener('resize', resize);
  resize();

  // ────────────────────────────────────────────────
  //  Game Logic
  // ────────────────────────────────────────────────
  function resetBall() {
    ballsFaced++;
    ball.x = canvas.width + 80;
    ball.y = 120 + Math.random() * (canvas.height * 0.42);
    ball.vx = - (7 + Math.random() * 5.5);
    ball.vy = (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random() * 3.5);
  }

  function startGame() {
    score = 0; wickets = 0; ballsFaced = 0; sixes = 0; fours = 0;
    scoreEl.textContent = 0;
    wicketsEl.textContent = 0;
    state = 'playing';
    menu.style.display = 'none';
    gameover.style.display = 'none';
    controls.style.display = 'flex';
    resetBall();
  }

  function endGame() {
    state = 'gameover';
    controls.style.display = 'none';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('stickCricketHigh', highScore);
    }

    statsEl.innerHTML = `
      Score: <b>${score}</b><br>
      ${score > highScore ? '<span style="color:#ff0">NEW HIGH SCORE!</span><br>' : ''}
      High Score: ${highScore}<br><br>
      Balls faced: ${ballsFaced}<br>
      Fours: ${fours}  •  Sixes: ${sixes}<br>
      Strike rate: ${ballsFaced ? Math.round(score / ballsFaced * 100) : 0}
    `;
    gameover.style.display = 'flex';
  }

  function swing(type) {
    if (state !== 'playing' || batsman.swinging) return;
    shotType = type;
    batsman.swinging = true;
    batsman.batAngle = 75;
    batsman.swingTimer = 0;
  }

  // ────────────────────────────────────────────────
  //  Update & Draw
  // ────────────────────────────────────────────────
  function update() {
    if (state !== 'playing') return;

    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.y < 80 || ball.y > canvas.height - 80) ball.vy *= -0.65;

    if (batsman.swinging) {
      batsman.batAngle -= 14;
      batsman.swingTimer++;
      if (batsman.swingTimer > 7) {
        batsman.swinging = false;
        batsman.batAngle = 0;
      }
    }

    // missed ball → wicket
    if (ball.x < batsman.x - 100) {
      wickets++;
      wicketsEl.textContent = wickets;
      showStatus("OUT!", "red", 1400);

      if (wickets >= 3) {
        endGame();
      } else {
        resetBall();
      }
    }

    // hit detection
    if (batsman.swinging &&
        ball.x > batsman.x - 10 &&
        ball.x < batsman.x + 140 &&
        Math.abs(ball.y - (batsman.y - 45)) < 85) {

      let runs = 0;
      let msg = "";
      let color = "#ffeb3b";

      if (ball.y >= perfectZone.min && ball.y <= perfectZone.max) {
        runs = (shotType === 'right') ? 6 : 4;
        msg = runs === 6 ? "SIX!" : "FOUR!";
        color = runs === 6 ? "#0f0" : "#ffeb3b";
        if (runs === 6) sixes++; else fours++;
      } else if (ball.y >= goodZone.min && ball.y <= goodZone.max) {
        runs = shotType === 'left' ? 2 : (shotType === 'right' ? 4 : 3);
        msg = runs + " runs";
        if (runs === 4) fours++;
      } else {
        runs = 1;
        msg = "Single";
      }

      score += runs;
      scoreEl.textContent = score;
      showStatus(msg, color, 1600);

      // send ball away
      ball.vx = 12 + Math.random() * 14;
      ball.vy = - (shotType === 'right' ? 14 : 7) + Math.random() * 10 - 5;

      resetBall();
    }
  }

  function showStatus(text, color, ms) {
    statusEl.textContent = text;
    statusEl.style.color = color;
    statusEl.style.opacity = 1;
    setTimeout(() => { statusEl.style.opacity = 0; }, ms - 400);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // sky
    const grad = ctx.createLinearGradient(0,0,0,canvas.height*0.75);
    grad.addColorStop(0, '#4fc3f7');
    grad.addColorStop(1, '#81d4fa');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height * 0.75);

    // pitch
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(0, canvas.height * 0.74, canvas.width, canvas.height);

    // grass hint
    ctx.fillStyle = 'rgba(0,80,0,0.4)';
    ctx.fillRect(0, canvas.height * 0.74, canvas.width, canvas.height);

    // wickets
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 7;
    const wx = batsman.x + 45;
    ctx.beginPath();
    ctx.moveTo(wx-22, batsman.y-90); ctx.lineTo(wx-22, batsman.y+25);
    ctx.moveTo(wx,    batsman.y-90); ctx.lineTo(wx,    batsman.y+25);
    ctx.moveTo(wx+22, batsman.y-90); ctx.lineTo(wx+22, batsman.y+25);
    ctx.stroke();

    // batsman
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(batsman.x, batsman.y-85, 26, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(batsman.x-16, batsman.y-60, 32, 85);
    ctx.lineWidth = 12; ctx.strokeStyle = '#0f0';
    ctx.beginPath(); ctx.moveTo(batsman.x-8, batsman.y+20); ctx.lineTo(batsman.x-60, batsman.y+95); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(batsman.x+8, batsman.y+20); ctx.lineTo(batsman.x+40, batsman.y+100); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(batsman.x-12, batsman.y-35); ctx.lineTo(batsman.x+55, batsman.y-15); ctx.stroke();

    // bat
    ctx.save();
    ctx.translate(batsman.x + 38, batsman.y - 35);
    ctx.rotate(batsman.batAngle * Math.PI / 180);
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(-8, -18, 110, 36);
    ctx.restore();

    // ball + trail
    ctx.fillStyle = 'rgba(220,40,40,0.35)';
    ctx.beginPath(); ctx.arc(ball.x + ball.vx*1.8, ball.y + ball.vy*1.8, ball.radius*1.8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#d32f2f';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();

    // shot arc
    ctx.strokeStyle = shotType === 'left' ? '#2196f3' : shotType === 'right' ? '#ff9800' : '#0f0';
    ctx.lineWidth = 9;
    ctx.beginPath();
    ctx.arc(batsman.x + 55, batsman.y - 55, 70, Math.PI*0.75, Math.PI*0.25, true);
    ctx.stroke();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ────────────────────────────────────────────────
  //  Controls
  // ────────────────────────────────────────────────
  document.getElementById('startBtn').onclick = startGame;
  document.getElementById('restartBtn').onclick = startGame;

  function onSwingLeft()  { swing('left'); }
  function onSwingStr()   { swing('straight'); }
  function onSwingRight() { swing('right'); }

  document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); onSwingLeft(); });
  document.getElementById('straightBtn').addEventListener('touchstart', e => { e.preventDefault(); onSwingStr(); });
  document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); onSwingRight(); });

  // Keyboard support
  window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft'  || e.code === 'KeyA') onSwingLeft();
    if (e.code === 'Space'      || e.code === 'ArrowUp' || e.code === 'KeyW') onSwingStr();
    if (e.code === 'ArrowRight' || e.code === 'KeyD') onSwingRight();
  });

  // Tap to start
  canvas.addEventListener('touchstart', e => {
    if (state === 'menu') {
      e.preventDefault();
      startGame();
    }
  }, { passive: false });

  // Optional fullscreen
  function tryFullscreen() {
    if (canvas.requestFullscreen && document.fullscreenElement === null) {
      canvas.requestFullscreen().catch(()=>{});
    }
  }
  canvas.addEventListener('touchend', tryFullscreen, { once: true });

  // ────────────────────────────────────────────────
  //  Boot
  // ────────────────────────────────────────────────
  resetBall();
  loop();
</script>
</body>
</html>
